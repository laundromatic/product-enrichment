name: shopgraph
description: Clean product data from any URL. One structured schema, any merchant. Schema.org + AI extraction. REST API, MCP server, npm SDK. 200 free calls/month.
icon: https://shopgraph.dev/icon.png
serverUrl: https://shopgraph.dev/mcp
configSchema:
  type: object
  required: []
  properties:
    payment_method_id:
      type: string
      description: "Stripe payment method ID for paid calls ($0.02/call). Optional — free tier (200 calls/month) works without this."
  additionalProperties: false
  description: "No configuration required for the free tier. Add payment_method_id for paid LLM-powered extraction."
