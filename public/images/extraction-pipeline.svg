<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 860">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b" />
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ef4444" />
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#16a34a" />
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.376  0 0 0 0 0.647  0 0 0 0 0.98  0 0 0 0.15 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes tierPulse {
        0%, 100% { stroke: rgba(0,0,0,0.85); filter: url(#shadow); }
        25%, 55% { stroke: rgba(96,165,250,0.5); filter: url(#glow-blue); }
      }
      .tier-box { animation: tierPulse 4.2s ease-in-out infinite; }
      .tier-box-1 { animation-delay: 0s; }
      .tier-box-2 { animation-delay: 1.4s; }
      .tier-box-3 { animation-delay: 2.8s; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="860" fill="#ffffff" rx="0"/>

  <!-- ========== SHOPGRAPH BOUNDARY BOX ========== -->
  <rect x="40" y="14" width="820" height="530" rx="12" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="1.5"/>

  <!-- ========== PRODUCT URL INPUT ========== -->
  <rect x="340" y="52" width="220" height="48" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="81" text-anchor="middle" font-size="14" font-weight="600" fill="#111">Product URL</text>

  <!-- Arrow down to Tier 1 -->
  <line x1="450" y1="100" x2="450" y2="132" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== TIER 1: SCHEMA.ORG ========== -->
  <rect class="tier-box tier-box-1" x="280" y="136" width="340" height="72" rx="10" fill="#ffffff" stroke="#111" stroke-width="2" filter="url(#shadow)"/>
  <rect x="280" y="136" width="340" height="24" rx="10" fill="rgba(0,0,0,0.85)"/>
  <rect x="280" y="148" width="340" height="12" fill="rgba(0,0,0,0.85)"/>
  <text x="450" y="153" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff" letter-spacing="0.05em">TIER 1: SCHEMA.ORG EXTRACTION</text>
  <text x="450" y="182" text-anchor="middle" font-size="12" font-weight="500" fill="#334155">JSON-LD / Schema.org markup present?</text>
  <text x="450" y="198" text-anchor="middle" font-size="11" font-weight="400" fill="#94a3b8">Baseline confidence: ~0.93  |  Latency: &lt;1s  |  Cost: $0.000</text>

  <!-- Success arrow (right, then down to confidence scoring) -->
  <line x1="620" y1="172" x2="700" y2="172" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="660" y="164" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">SUCCESS</text>

  <!-- Fail arrow down to Tier 2 -->
  <line x1="450" y1="208" x2="450" y2="246" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="470" y="232" font-size="10" font-weight="500" fill="#ef4444">MISSING / MALFORMED</text>

  <!-- ========== TIER 2: LLM EXTRACTION ========== -->
  <rect class="tier-box tier-box-2" x="280" y="250" width="340" height="72" rx="10" fill="#ffffff" stroke="#111" stroke-width="2" filter="url(#shadow)"/>
  <rect x="280" y="250" width="340" height="24" rx="10" fill="rgba(0,0,0,0.85)"/>
  <rect x="280" y="262" width="340" height="12" fill="rgba(0,0,0,0.85)"/>
  <text x="450" y="267" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff" letter-spacing="0.05em">TIER 2: LLM EXTRACTION</text>
  <text x="450" y="296" text-anchor="middle" font-size="12" font-weight="500" fill="#334155">Raw DOM passed to LLM for structuring</text>
  <text x="450" y="312" text-anchor="middle" font-size="11" font-weight="400" fill="#94a3b8">Baseline confidence: 0.60-0.85  |  Latency: ~3s  |  Cost: $0.001</text>

  <!-- Success arrow (right, then down to confidence scoring) -->
  <line x1="620" y1="286" x2="700" y2="286" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="660" y="278" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">SUCCESS</text>

  <!-- Fail arrow down to Tier 3 -->
  <line x1="450" y1="322" x2="450" y2="360" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="470" y="346" font-size="10" font-weight="500" fill="#ef4444">403 / JS-RENDERED</text>

  <!-- ========== TIER 3: BROWSER RENDERING ========== -->
  <rect class="tier-box tier-box-3" x="280" y="364" width="340" height="72" rx="10" fill="#ffffff" stroke="#111" stroke-width="2" filter="url(#shadow)"/>
  <rect x="280" y="364" width="340" height="24" rx="10" fill="rgba(0,0,0,0.85)"/>
  <rect x="280" y="376" width="340" height="12" fill="rgba(0,0,0,0.85)"/>
  <text x="450" y="381" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff" letter-spacing="0.05em">TIER 3: BROWSER RENDERING (PLAYWRIGHT)</text>
  <text x="450" y="410" text-anchor="middle" font-size="12" font-weight="500" fill="#334155">Headless Chrome renders full JS, then LLM structures</text>
  <text x="450" y="426" text-anchor="middle" font-size="11" font-weight="400" fill="#94a3b8">Baseline confidence: variable  |  Latency: 5-10s  |  Cost: $0.005</text>

  <!-- Success arrow (right) -->
  <line x1="620" y1="400" x2="700" y2="400" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="660" y="392" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">SUCCESS</text>

  <!-- Fail: unsolvable captcha -->
  <rect x="280" y="446" width="340" height="30" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="450" y="465" text-anchor="middle" font-size="11" font-weight="500" fill="#dc2626">Unsolvable CAPTCHA: returns 403 + captcha_required</text>

  <!-- ========== CONFIDENCE SCORING (right column) ========== -->
  <rect x="710" y="136" width="140" height="300" rx="10" fill="#ffffff" stroke="rgba(0,0,0,0.08)" stroke-width="2" filter="url(#shadow)"/>
  <rect x="710" y="136" width="140" height="24" rx="10" fill="rgba(0,0,0,0.08)"/>
  <rect x="710" y="148" width="140" height="12" fill="rgba(0,0,0,0.08)"/>
  <text x="780" y="153" text-anchor="middle" font-size="10" font-weight="600" fill="#111" letter-spacing="0.05em">CONFIDENCE</text>

  <text x="780" y="182" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Per-Field Scores</text>
  <text x="780" y="200" text-anchor="middle" font-size="10" fill="#64748b">product_name: 0.98</text>
  <text x="780" y="216" text-anchor="middle" font-size="10" fill="#64748b">price: 0.93</text>
  <text x="780" y="232" text-anchor="middle" font-size="10" fill="#64748b">brand: 0.94</text>
  <text x="780" y="248" text-anchor="middle" font-size="10" fill="#64748b">availability: 0.83</text>

  <line x1="726" y1="262" x2="834" y2="262" stroke="#e2e8f0" stroke-width="1"/>

  <text x="780" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Metadata</text>
  <text x="780" y="300" text-anchor="middle" font-size="10" fill="#64748b">extraction_method</text>
  <text x="780" y="316" text-anchor="middle" font-size="10" fill="#64748b">confidence_method</text>
  <text x="780" y="332" text-anchor="middle" font-size="10" fill="#64748b">latency_ms</text>

  <line x1="726" y1="346" x2="834" y2="346" stroke="#e2e8f0" stroke-width="1"/>

  <text x="780" y="366" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">AgentReady Score</text>
  <text x="780" y="384" text-anchor="middle" font-size="10" fill="#64748b">6 dimensions</text>
  <text x="780" y="400" text-anchor="middle" font-size="10" fill="#64748b">5 active, 1 stub</text>
  <text x="780" y="420" text-anchor="middle" font-size="10" fill="#94a3b8">(if include_score=true)</text>

  <!-- Arrow from confidence box down to API response -->
  <line x1="780" y1="436" x2="780" y2="496" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== API RESPONSE OUTPUT ========== -->
  <rect x="630" y="500" width="220" height="36" rx="8" fill="#111" filter="url(#shadow)"/>
  <text x="740" y="523" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">JSON Response</text>

  <!-- ========== BOUNDARY LINE ========== -->
  <line x1="40" y1="570" x2="860" y2="570" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="8,4"/>
  <rect x="330" y="558" width="240" height="24" rx="4" fill="#ffffff"/>
  <text x="450" y="575" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.08em">YOUR AGENT DECIDES</text>

  <!-- ========== CONSUMER ROUTING ========== -->
  <!-- Arrow from boundary to routing -->
  <line x1="450" y1="582" x2="450" y2="614" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="450" y="634" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Per-Field Confidence Routing</text>
  <text x="450" y="652" text-anchor="middle" font-size="11" fill="#94a3b8">Evaluate field_confidence values against your thresholds</text>

  <!-- Three routing outcomes -->
  <!-- Lines from center to three boxes -->
  <line x1="450" y1="660" x2="160" y2="700" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="450" y1="660" x2="450" y2="700" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="450" y1="660" x2="740" y2="700" stroke="#ef4444" stroke-width="1.5"/>

  <!-- Autonomous box -->
  <rect x="60" y="700" width="200" height="80" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="160" y="730" text-anchor="middle" font-size="14" font-weight="700" fill="#16a34a">Autonomous</text>
  <text x="160" y="750" text-anchor="middle" font-size="20" font-weight="700" fill="#16a34a">≥ 0.85</text>
  <text x="160" y="770" text-anchor="middle" font-size="10" fill="#64748b">Agent acts without intervention</text>

  <!-- Human Review box -->
  <rect x="350" y="700" width="200" height="80" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="730" text-anchor="middle" font-size="14" font-weight="700" fill="#d97706">Human Review</text>
  <text x="450" y="750" text-anchor="middle" font-size="20" font-weight="700" fill="#d97706">0.60 - 0.84</text>
  <text x="450" y="770" text-anchor="middle" font-size="10" fill="#64748b">Flag for verification before acting</text>

  <!-- Escalate box -->
  <rect x="640" y="700" width="200" height="80" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="740" y="730" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">Escalate / Manual</text>
  <text x="740" y="750" text-anchor="middle" font-size="20" font-weight="700" fill="#ef4444">&lt; 0.60</text>
  <text x="740" y="770" text-anchor="middle" font-size="10" fill="#64748b">Route to manual data collection</text>

  <!-- Legend -->
  <rect x="40" y="808" width="820" height="40" rx="8" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
  <circle cx="80" cy="828" r="6" fill="#111"/>
  <text x="92" y="832" font-size="10" font-weight="500" fill="#64748b">Extraction Tier</text>
  <circle cx="210" cy="828" r="6" fill="rgba(0,0,0,0.08)"/>
  <text x="222" y="832" font-size="10" font-weight="500" fill="#64748b">Confidence Scoring</text>
  <line x1="350" y1="828" x2="374" y2="828" stroke="#16a34a" stroke-width="2"/>
  <text x="380" y="832" font-size="10" font-weight="500" fill="#64748b">Success Path</text>
  <line x1="470" y1="828" x2="494" y2="828" stroke="#ef4444" stroke-width="2"/>
  <text x="500" y="832" font-size="10" font-weight="500" fill="#64748b">Failure / Escalation</text>
  <line x1="610" y1="828" x2="634" y2="828" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="640" y="832" font-size="10" font-weight="500" fill="#64748b">System Boundary</text>
</svg>